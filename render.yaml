services:
  # Web Service
  - type: web
    name: expense-tracker
    env: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
